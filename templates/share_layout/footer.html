{% load i18n %}
{% load blog_tags %}
<footer class="mt-16 border-t border-border/40 bg-secondary/40">
    <div class="mx-auto max-w-container-max px-4 py-8 md:px-8">
        <div class="flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
            <div>
                <a href="/" class="font-headline text-sm font-bold tracking-tight text-primary-600 transition-colors hover:text-primary-500">
                    {{ SITE_NAME }}
                </a>
                <p class="mt-1 max-w-md text-xs leading-relaxed text-muted-foreground">
                    {{ SITE_DESCRIPTION|default:"专注于技术分享" }}
                </p>
            </div>

            <nav class="flex flex-wrap items-center gap-x-5 gap-y-2" aria-label="{% trans 'Footer' %}">
                <a href="{% url 'blog:index' %}" class="editorial-footer-link">技术摘要</a>
                <a href="{% url 'blog:news' %}" class="editorial-footer-link">AI 快讯</a>
                <a href="https://github.com/jeffryqueenie-coder/djangoblog" class="editorial-footer-link" target="_blank" rel="noopener">GitHub</a>
            </nav>
        </div>

        <div class="mt-6 flex flex-col justify-between gap-3 border-t border-border/40 pt-4 text-[11px] text-muted-foreground md:flex-row md:items-center">
            <span>Built with Django &amp; Tailwind CSS</span>
            <div class="flex items-center gap-4">
                {% if BEIAN_CODE %}
                    <a href="https://beian.miit.gov.cn/" target="_blank" rel="nofollow" class="transition-colors hover:text-primary-600">
                        {{ BEIAN_CODE }}
                    </a>
                {% endif %}
                <span>&copy; {% now "Y" %} {{ SITE_NAME }}</span>
            </div>
        </div>
    </div>
</footer>
